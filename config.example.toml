# metapak Configuration

[theme]
# Theme preset: "mocha" (dark), "latte" (light), "dark", "light", or "custom"
# "mocha" and "latte" use Catppuccin color palettes.
preset = "mocha"

# Optional color overrides
# These can be used to tweak any preset or when using preset = "custom"
# Colors can be:
# - Hex strings: "#89b4fa"
# - Named colors: "blue", "red", "green", "yellow", "magenta", "cyan", "white", "black"
# - RGB objects: { r = 137, g = 180, b = 250 }

# primary_color: Used for main UI accents and selection highlights
# primary_color = "#89b4fa"

# secondary_color: Used for secondary elements and AUR packages
# secondary_color = "#fab387"

# accent_color: Used for success messages and installed packages
# accent_color = "#a6e3a1"

[aur]
helper = "auto"

[keyboard]
quit = "q"
search = "/"
install = "enter"
toggle_selection = "tab"
next_page = "n"
prev_page = "p"
next = "j"
prev = "k"
help = "?"
history = "t"
diagnostics = "h"
filter = "f"
sort = "s"
undo = "u"
details = "d"
dependencies = "v"
sidebar = "\\"
refresh = "r"
update = "U"
rollback = "R"

[ui]
items_per_page = 20
search_debounce_ms = 300
max_search_history = 50
max_undo_history = 20

# Auto-update settings
auto_check_updates = false          # Enable periodic update checks
update_check_interval_minutes = 60  # How often to check for updates
auto_update_on_startup = false     # Check for updates on app start

[search]
cache_ttl_seconds = 300             # How long to cache search results

[robustness]
snapshot_keep_count = 5            # Number of btrfs snapshots to keep
simulation_backend = "auto"        # Backend for simulation (auto, mock)

[hooks]
# Shell commands to run before/after package operations
# Example: pre_install = ["echo 'Installing packages...'"]
pre_install = []
post_install = []
pre_remove = []
post_remove = []
pre_update = []
post_update = []

[i18n]
# Language setting: "auto" to detect from environment, or "en", "es", "fr", "de", "zh", "ja"
language = "auto"

[notifications]
# Desktop notification settings
enabled = true                     # Enable/disable desktop notifications
on_install = true                  # Notify after install/remove operations
on_update = true                   # Notify when updates are available
on_error = true                    # Notify on operation errors

[telemetry]
# Operation logging settings
enabled = true                     # Enable/disable operation logging
max_log_size_mb = 5                # Maximum log file size in MB
max_log_files = 5                  # Number of log files to keep
