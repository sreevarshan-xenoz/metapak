# Arch TUI Configuration

[theme]
# Theme preset: "mocha" (dark), "latte" (light), "dark", "light", or "custom"
preset = "mocha"

# Optional color overrides (only used when preset = "custom" or to tweak presets)
# Colors can be hex strings ("#89b4fa"), RGB ({r=100, g=150, b=255}), or named ("blue")
# primary_color = "#89b4fa"
# secondary_color = "#fab387"
# accent_color = "green"

[aur]
helper = "auto"

[keyboard]
quit = "q"
search = "/"
install = "enter"
toggle_selection = "tab"
next_page = "n"
prev_page = "p"
next = "j"
prev = "k"
help = "?"
history = "t"
diagnostics = "h"
filter = "f"
sort = "s"
undo = "u"
details = "d"
dependencies = "v"
sidebar = "\\"
refresh = "r"
update = "U"
rollback = "R"

[ui]
items_per_page = 20
search_debounce_ms = 300
max_search_history = 50
max_undo_history = 20

# Auto-update settings
auto_check_updates = false          # Enable periodic update checks
update_check_interval_minutes = 60  # How often to check for updates
auto_update_on_startup = false     # Check for updates on app start
